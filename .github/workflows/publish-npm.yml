name: Publish to npm (Trusted Publisher)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - name: Upgrade npm
        run: |
          npm install -g npm@latest
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"

      - name: Remove publishConfig from package.json
        run: |
          jq 'del(.publishConfig)' package.json > temp.json && mv temp.json package.json

      - name: Update package.json name
        run: |
          jq '.name = "${{ github.event.repository.name }}"' package.json > temp.json && mv temp.json package.json

      - name: Remove .npmrc
        run: rm -f .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Show Build Folder
        run: ls -l build/

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(jq -r '.version' package.json)"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          echo "Version check passed: $TAG_VERSION"

      - name: Publish to npm (OIDC)
        if: startsWith(github.ref, 'refs/tags/')
        run: npm publish --provenance --access public
